<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Communal Locker Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; background: #007bff; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .locker { border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa; position: relative; transition: 0.3s; }
        .occupied { background: #e7f3ff; border-color: #b3d7ff; }
        
        .checkout-btn { background: #ff4d4d; font-size: 10px; padding: 4px 8px; margin-top: 10px; }
        .checkout-btn:hover { background: #cc0000; }
        
        .result-box { margin: 20px 0; padding: 15px; border-radius: 8px; display: none; text-align: center; border: 2px dashed #007bff; }
        .code-text { font-size: 24px; color: #d32f2f; display: block; margin-top: 5px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Locker Management</h2>
    
    <div class="input-group">
        <input type="text" id="userName" placeholder="Enter your name to claim a locker">
        <button onclick="assignLocker()">Claim</button>
    </div>

    <div id="resultBox" class="result-box"></div>

    <div class="grid" id="lockerGrid"></div>
</div>

<script>
    // Initial data structure
    const defaultLockers = [
        { id: 1, code: "4491", user: null },
        { id: 2, code: "8230", user: null },
        { id: 3, code: "1156", user: null },
        { id: 4, code: "9002", user: null },
        { id: 5, code: "3387", user: null },
        { id: 6, code: "7714", user: null },
        { id: 7, code: "5521", user: null },
        { id: 8, code: "2098", user: null }
    ];

    // Load from LocalStorage or use defaults
    let lockers = JSON.parse(localStorage.getItem('lockerData')) || defaultLockers;

    function saveData() {
        localStorage.setItem('lockerData', JSON.stringify(lockers));
    }

    function render() {
        const grid = document.getElementById('lockerGrid');
        grid.innerHTML = '';
        
        lockers.forEach((locker, index) => {
            const div = document.createElement('div');
            div.className = `locker ${locker.user ? 'occupied' : ''}`;
            
            let content = `<strong>Locker ${locker.id}</strong><br>`;
            if (locker.user) {
                content += `<span>User: ${locker.user}</span><br>
                            <button class="checkout-btn" onclick="checkOut(${index})">Check Out</button>`;
            } else {
                content += `<span style="color: #999;">Available</span>`;
            }
            
            div.innerHTML = content;
            grid.appendChild(div);
        });
    }

    function assignLocker() {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        const resultBox = document.getElementById('resultBox');

        if (!name) return alert("Please enter a name.");

        const locker = lockers.find(l => l.user === null);

        if (locker) {
            locker.user = name;
            saveData();
            render();
            
            // Show the user their code
            resultBox.style.display = 'block';
            resultBox.innerHTML = `Hi <strong>${name}</strong>, use Locker <strong>#${locker.id}</strong><br>
                                   Your Code: <span class="code-text">${locker.code}</span>`;
            nameInput.value = '';
        } else {
            alert("All lockers are full!");
        }
    }

    function checkOut(index) {
        if (confirm(`Are you sure you want to clear Locker ${lockers[index].id}?`)) {
            lockers[index].user = null;
            document.getElementById('resultBox').style.display = 'none';
            saveData();
            render();
        }
    }

    render();
</script>

</body>
</html>
